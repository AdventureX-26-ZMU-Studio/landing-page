<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZMU Studio</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .app-name-link { font-weight: 700; }
    .cover { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e) !important; }
    .cover-main { color: #fff !important; }
    .cover-main p { color: rgba(255,255,255,0.7) !important; }
    .cover-main .badge {
      display: inline-block;
      padding: 0.375rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      background: rgba(102, 126, 234, 0.15);
      color: #a78bfa;
      border: 1px solid rgba(102, 126, 234, 0.25);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script>
    window.$docsify = {
      name: 'ZMU Studio',
      repo: 'https://github.com/AdventureX-26-ZMU-Studio/landing-page',
      loadSidebar: false,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
</body>
</html>
